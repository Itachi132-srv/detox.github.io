<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detox Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(15px);
border-right:2px solid #ff6a00;
padding:25px 20px;
transition:0.4s;
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo img{
width:90px;
border-radius:50%;
border:3px solid #ff6a00;
box-shadow:0 0 25px #ff6a00;
}

.logo h2{
margin-top:10px;
color:#ff6a00;
font-weight:700;
letter-spacing:2px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:14px;
margin-bottom:12px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
font-weight:500;
}

.sidebar ul li:hover{
background:#ff6a00;
transform:translateX(5px);
}

/* Main */

.main{
margin-left:260px;
padding:40px;
transition:0.4s;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h1{
font-size:28px;
color:#ff6a00;
}

.btn{
background:linear-gradient(45deg,#ff6a00,#ff8800);
padding:12px 25px;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff6a00;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,106,0,0.3);
transition:0.4s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,106,0,0.7);
}

.card h3{
color:#ff6a00;
margin-bottom:10px;
}

.card p{
color:#ccc;
font-size:14px;
}

/* Footer */

.footer{
margin-top:50px;
text-align:center;
color:#666;
font-size:13px;
}

/* Mobile Responsive */

@media(max-width:900px){

.sidebar{
width:70px;
padding:20px 10px;
}

.logo h2{
display:none;
}

.sidebar ul li{
text-align:center;
font-size:12px;
padding:10px 5px;
}

.main{
margin-left:70px;
padding:25px;
}

.header h1{
font-size:20px;
}

}

@media(max-width:500px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
flex-direction:row;
justify-content:space-around;
border-right:none;
border-bottom:2px solid #ff6a00;
}

.logo{
display:none;
}

.sidebar ul{
display:flex;
width:100%;
justify-content:space-around;
}

.sidebar ul li{
margin:5px;
font-size:11px;
padding:8px;
}

.main{
margin-left:0;
padding:20px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="detox.png" alt="Detox Logo">
<h2>DETOX</h2>
</div>

<ul>
<li>Dashboard</li>
<li>Servers</li>
<li>Moderation</li>
<li>Analytics</li>
<li>Settings</li>
<li>Premium</li>
</ul>

</div>

<div class="main">

<div class="header">
<h1>Detox Bot Control Panel</h1>
<button class="btn">Invite Bot</button>
</div>

<div class="cards">

<div class="card">
<h3>Total Servers</h3>
<p>248 Active Servers</p>
</div>

<div class="card">
<h3>Total Users</h3>
<p>98,230 Users</p>
</div>

<div class="card">
<h3>Commands Used</h3>
<p>45,902 Commands</p>
</div>

<div class="card">
<h3>Bot Status</h3>
<p style="color:#00ff88;font-weight:600;">Online & Stable</p>
</div>

</div>

<div class="footer">
© 2026 Detox Bot | Ultra ProMax Dashboard
</div>

</div>

</body>
</html>
